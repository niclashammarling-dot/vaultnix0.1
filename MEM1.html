<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEM1 — a deliberate external mind</title>
  <link rel="stylesheet" href="lib/styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <script type="text/babel" src="lib/data.jsx"></script>
  <script type="text/babel" src="lib/graph.jsx"></script>
  <script type="text/babel" src="lib/ask.jsx"></script>
  <script type="text/babel" src="lib/views.jsx"></script>
  <script type="text/babel" src="lib/work_views.jsx"></script>
  <script type="text/babel" src="lib/mobile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "variant": "paper",
      "density": "comfortable",
      "showGraph": true,
      "startView": "home",
      "mode": "use"
    }/*EDITMODE-END*/;

    const getStored = (k, fallback) => {
      try { return localStorage.getItem('mem1:' + k) || fallback; } catch { return fallback; }
    };

    // Sub-modes per macro-mode
    const WORK_SUBMODES = [
      { id: 'ingest',     label: 'Ingest',     desc: 'raw/ capture' },
      { id: 'ideas',      label: 'Ideas',      desc: 'actionable backlog' },
      { id: 'agenda',     label: 'Agenda',     desc: 'stub list' },
      { id: 'inspection', label: 'Inspection', desc: 'compile diff review' },
    ];
    const USE_SUBMODES = [
      { id: 'home',       label: 'Index',      desc: 'overview' },
      { id: 'navigator',  label: 'Navigator',  desc: 'topographic map' },
      { id: 'lens',       label: 'Lens',       desc: 'MOC-scoped' },
      { id: 'ask',        label: 'Ask',        desc: 'traversal query' },
      { id: 'mobile',     label: 'Mobile',     desc: 'sensor companion' },
      { id: 'search',     label: 'Search',     desc: 'full-text' },
      { id: 'benchmark',  label: 'Benchmark',  desc: 'traversal quality' },
    ];

    function App() {
      const [mode, setMode] = React.useState(() => getStored('mode', TWEAK_DEFAULTS.mode));
      const [view, setView] = React.useState(() => getStored('view', TWEAK_DEFAULTS.startView));
      const [domainId, setDomainId] = React.useState('knowledge-work');
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [switching, setSwitching] = React.useState(false);
      const [navHistory, setNavHistory] = React.useState([]);
      const [articlePath, setArticlePath] = React.useState(null);

      React.useEffect(() => { try { localStorage.setItem('mem1:mode', mode); } catch {} }, [mode]);
      React.useEffect(() => { try { localStorage.setItem('mem1:view', view); } catch {} }, [view]);

      React.useEffect(() => {
        document.documentElement.setAttribute('data-variant', tweaks.variant);
        document.documentElement.setAttribute('data-density', tweaks.density);
        document.documentElement.setAttribute('data-mode', mode);
      }, [tweaks, mode]);

      // Tweaks protocol
      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          else if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const updateTweak = (k, v) => {
        setTweaks(prev => {
          const next = { ...prev, [k]: v };
          try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
          return next;
        });
      };

      const switchMode = (m) => {
        if (m === mode) return;
        setSwitching(true);
        setTimeout(() => {
          setMode(m);
          setView(m === 'work' ? 'ingest' : 'home');
          setTimeout(() => setSwitching(false), 50);
        }, 280);
      };

      const go = (v, d, ap) => {
        setNavHistory(h => [...h, { view, domainId, articlePath }]);
        setView(v);
        if (d !== undefined && d !== null) setDomainId(d);
        if (ap !== undefined) setArticlePath(ap);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      const goBack = () => {
        setNavHistory(h => {
          if (!h.length) return h;
          const prev = h[h.length - 1];
          setView(prev.view);
          setDomainId(prev.domainId);
          setArticlePath(prev.articlePath);
          window.scrollTo({ top: 0, behavior: 'instant' });
          return h.slice(0, -1);
        });
      };

      const submodes = mode === 'work' ? WORK_SUBMODES : USE_SUBMODES;

      return (
        <div className={`shell mode-${mode} ${switching ? 'shell-switching' : ''}`} data-screen-label={`MEM1/${mode}/${view}`}>

          {/* ─── GLOBAL MODE BAR — always visible, defines the environment ─── */}
          <div className="mode-bar">
            <div className="mode-bar-inner">
              <div className="mb-brand">
                <div className="mb-mark">M1</div>
                <div className="mb-name">MEM1</div>
              </div>

              <div className="mode-toggle" role="tablist">
                <div className="mode-toggle-track">
                  <div className={`mode-toggle-thumb mode-toggle-thumb-${mode}`} />
                </div>
                <button
                  className={`mode-toggle-btn ${mode === 'work' ? 'active' : ''}`}
                  onClick={() => switchMode('work')}
                  role="tab"
                  aria-selected={mode === 'work'}
                >
                  <span className="mtb-kicker">A</span>
                  <span className="mtb-label">Work on the vault</span>
                  <span className="mtb-sub">builder · blueprint</span>
                </button>
                <button
                  className={`mode-toggle-btn ${mode === 'use' ? 'active' : ''}`}
                  onClick={() => switchMode('use')}
                  role="tab"
                  aria-selected={mode === 'use'}
                >
                  <span className="mtb-kicker">B</span>
                  <span className="mtb-label">Use the vault</span>
                  <span className="mtb-sub">operator · canvas</span>
                </button>
              </div>

              <div className="mb-stats">
                {mode === 'work' ? (
                  <>
                    <div className="mb-stat mb-stat-warn"><em>3</em> pending</div>
                    <div className="mb-stat"><em>5/6</em> hooks</div>
                    <div className="mb-stat"><em>6h</em> → compile</div>
                  </>
                ) : (
                  <>
                    <div className="mb-stat"><em>151</em> articles</div>
                    <div className="mb-stat"><em>0.84</em> benchmark</div>
                    <div className="mb-stat"><em>6h</em> fresh</div>
                  </>
                )}
              </div>
            </div>

            {/* Sub-mode tabs */}
            <div className="submode-bar">
              <div className="submode-bar-inner">
                {navHistory.length > 0 && (
                  <button className="submode-tab back-tab" onClick={goBack}>
                    <span className="sm-label">← Back</span>
                    <span className="sm-desc">{navHistory[navHistory.length-1]?.view || ''}</span>
                  </button>
                )}
                {submodes.map(s => (
                  <button
                    key={s.id}
                    className={`submode-tab ${view === s.id ? 'active' : ''}`}
                    onClick={() => go(s.id)}
                  >
                    <span className="sm-label">{s.label}</span>
                    <span className="sm-desc">{s.desc}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Mode-switch overlay */}
          {switching && (
            <div className="mode-switch-overlay">
              <div className="msw-inner">
                <div className="msw-kicker mono">{mode === 'work' ? 'EXITING BUILDER' : 'EXITING OPERATOR'} →</div>
                <div className="msw-title">{mode === 'work' ? 'Use the vault' : 'Work on the vault'}</div>
                <div className="msw-sub">{mode === 'work' ? 'canvas · synthesize · explore' : 'blueprint · correct · structure'}</div>
              </div>
            </div>
          )}

          {/* ─── MAIN ─── */}
          <main className="main">
            {/* WORK sub-modes */}
            {mode === 'work' && view === 'ingest'     && <IngestView />}
            {mode === 'work' && view === 'ideas'      && <IdeasView go={go} />}
            {mode === 'work' && view === 'agenda'     && <AgendaView />}
            {mode === 'work' && view === 'inspection' && <InspectionView />}

            {/* USE sub-modes */}
            {mode === 'use' && view === 'home'      && <HomeView go={go} />}
            {mode === 'use' && view === 'navigator' && <NavigatorView go={go} />}
            {mode === 'use' && view === 'lens'      && <LensView domainId={domainId} go={go} />}
            {mode === 'use' && view === 'ask'       && <AskView variant={tweaks.variant} />}
            {mode === 'use' && view === 'mobile'    && <MobileView />}
            {mode === 'use' && view === 'search'    && <SearchView go={go} />}
            {mode === 'use' && view === 'benchmark' && <BenchmarkView />}
            {mode === 'use' && view === 'domain'    && <DomainView domainId={domainId} go={go} />}
            {mode === 'use' && view === 'article'   && <ArticleView go={go} articlePath={articlePath} />}

            {/* Fallbacks if someone persists an invalid combo */}
            {mode === 'work' && !['ingest','ideas','agenda','inspection'].includes(view) && <IngestView />}
          </main>

          {tweaksOpen && (
            <div className="tweaks-panel">
              <div className="tweaks-head">
                <div className="tweaks-title">TWEAKS</div>
                <button className="tweaks-close" onClick={() => setTweaksOpen(false)}>×</button>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Macro mode</div>
                <div className="tweak-options">
                  <button className={`tweak-opt ${mode === 'work' ? 'active' : ''}`} onClick={() => switchMode('work')}>A · Work</button>
                  <button className={`tweak-opt ${mode === 'use' ? 'active' : ''}`} onClick={() => switchMode('use')}>B · Use</button>
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Aesthetic variant</div>
                <div className="tweak-options">
                  {['warm-dark','paper','terminal'].map(v => (
                    <button key={v} className={`tweak-opt ${tweaks.variant === v ? 'active' : ''}`} onClick={() => updateTweak('variant', v)}>{v}</button>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Density</div>
                <div className="tweak-options">
                  {['compact','default','comfortable'].map(d => (
                    <button key={d} className={`tweak-opt ${tweaks.density === d ? 'active' : ''}`} onClick={() => updateTweak('density', d)}>{d}</button>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Jump · Work</div>
                <div className="tweak-options">
                  {WORK_SUBMODES.map(s => (
                    <button key={s.id} className="tweak-opt" onClick={() => { switchMode('work'); setTimeout(() => go(s.id), 350); }}>{s.label}</button>
                  ))}
                </div>
              </div>

              <div className="tweak-row">
                <div className="tweak-label">Jump · Use</div>
                <div className="tweak-options">
                  {USE_SUBMODES.map(s => (
                    <button key={s.id} className="tweak-opt" onClick={() => { switchMode('use'); setTimeout(() => go(s.id), 350); }}>{s.label}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
